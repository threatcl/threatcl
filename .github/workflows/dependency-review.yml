# Blocks PRs that introduce dependencies with known vulnerabilities, using
# the diff of the dependency graph (which is already enabled on this repo).
# This is the PR-time complement to govulncheck: dependency-review catches a
# bad dep the moment it's added; govulncheck catches CVEs disclosed later.
name: dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress block)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.actions.githubusercontent.com:443
            api.deps.dev:443
            api.github.com:443
            api.securityscorecards.dev:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
