# Static analysis of the GitHub Actions workflows themselves (template
# injection, credential persistence, cache poisoning, unpinned actions, …).
# The workflows are the release pipeline's control plane — a bug here is a
# supply-chain bug. Findings are uploaded as SARIF to code scanning.
name: zizmor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF findings to code scanning
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          # Pin the analyzer itself, not just the action wrapper.
          version: '1.26.1'
