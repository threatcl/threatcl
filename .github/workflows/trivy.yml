# Weekly CVE scan of the *published* container image (ghcr.io/threatcl/threatcl
# is the only image this repo ships; :latest and :v<version> share a digest).
#
# Why scan an image we just built: vulnerabilities are disclosed *after*
# shipping. The Go dependencies are covered at source by govulncheck +
# dependency-review, so the unique value here is the alpine base layer
# (musl/busybox/openssl) — a new CVE there should trigger a patch release,
# and this scan is the alert. SARIF goes to code scanning.
#
# (This replaces the old Snyk container scan, which needed a SNYK_TOKEN and
# died red when the token did — Trivy needs no account or secret.)
name: trivy image scan

on:
  schedule:
    - cron: '30 19 * * 5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan-published-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF findings to code scanning
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/threatcl/threatcl:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore # accepted-risk CVEs, documented per entry
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
