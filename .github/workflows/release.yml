name: release

# One workflow, three trust contexts (see docs/SLSA.md):
#   - pull_request  -> dry-run the whole flow, no publish (fork-safe, read-only)
#   - push to main  -> build `dev` snapshot binaries, uploaded as workflow
#                      artifacts (post-merge; no release is touched)
#   - push tag v*   -> full release: GitHub Release + multi-arch image + latest
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # PR into main: build every platform archive, checksums, AND the container
  # images via GoReleaser snapshot — with NO publish/push. This catches
  # cross-platform build, packaging, and Dockerfile/GoReleaser-config breakage
  # before it can reach a tag. Read-only token; safe for fork PRs.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Egress audit only for now: after a couple of clean audit baselines,
      # flip to `egress-policy: block` with the observed `allowed-endpoints`.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          # No cache in the artifact-building workflow: a poisoned cache entry
          # would flow straight into released binaries (zizmor: cache-poisoning).
          cache: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: GoReleaser dry-run (snapshot, no publish)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Exact GoReleaser pin (not "~> v2"): the action downloads the
          # GoReleaser binary at run time, so a floating range would pull
          # whatever the newest v2.x is into the release path. Bump deliberately.
          version: v2.16.0
          args: release --snapshot --clean

  # Push to main (post-merge, trusted): build the binaries + checksums and
  # upload them as workflow ARTIFACTS — not a release. This replaced the old
  # rolling `dev` pre-release: with immutable releases enabled (Phase 6),
  # re-publishing a release under a reused tag is impossible by design, and a
  # deleted immutable release burns its tag name forever — a rolling tag can't
  # exist in that world. Artifacts expire on their own and grant this job a
  # read-only token. Images are skipped here (validated on PR, only tags push
  # images) to keep main fast.
  dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: false # no cache in artifact-building jobs (cache-poisoning)
      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: GoReleaser build (snapshot, no docker)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.16.0 # exact pin — see note in `validate`
          args: release --snapshot --clean --skip=docker
      - name: Upload dev build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: threatcl-dev
          # Same file set the rolling pre-release used to carry. Grab the
          # latest from the most recent main-branch run of this workflow
          # (Actions tab, or: gh run download --repo threatcl/threatcl
          # --name threatcl-dev). Unstable; for production use a tagged release.
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sbom.json
            dist/SHA256SUMS
          retention-days: 30
          if-no-files-found: error

  # Tag v*: the real release. GoReleaser builds + publishes the GitHub Release
  # (mac/linux/windows archives + SHA256SUMS) and builds + pushes the multi-arch
  # image as :v<version> and :latest. Then SLSA build provenance is attested for
  # every released artifact (Phase 3, see docs/SLSA.md):
  #   - one signed provenance over each platform archive + SHA256SUMS, and
  #   - one signed provenance over the multi-arch image, by digest, pushed to ghcr.
  # Signing is keyless (GitHub OIDC -> Fulcio); no signing secret is exposed to
  # any build step. id-token/attestations are scoped to THIS job only.
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Deployment-protected environment (Phase 6): with a required reviewer
    # configured on `release` (Settings -> Environments), this job PAUSES until
    # a maintainer approves it in the GitHub UI — a web-session + 2FA second
    # factor between a v* tag appearing and artifacts being signed/published.
    # Needed because the v* tag ruleset's required_signatures rule does NOT
    # verify tag signatures (only commits introduced by the push), so any
    # write-access credential can create a passing v* tag via the API. The OIDC
    # subject also becomes repo:threatcl/threatcl:environment:release, which
    # verifiers can pin. Unconfigured, the environment is inert (no approval
    # prompt), so this line is safe to merge before the settings step.
    environment: release
    permissions:
      contents: write          # create the GitHub Release
      packages: write          # push image + its attestation to ghcr.io
      id-token: write          # OIDC token for keyless (Fulcio) signing
      attestations: write      # record provenance via the GitHub attestations API
      artifact-metadata: write # storage record for attestations
    steps:
      # This job holds id-token + packages + contents write — the crown jewels.
      # Egress audit only for now: after an audit baseline from a real release,
      # flip to `egress-policy: block` with the observed `allowed-endpoints`.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: false # no cache in artifact-building jobs (cache-poisoning)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.16.0 # exact pin — see note in `validate`
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- SLSA build provenance (Phase 3) -----------------------------------
      # Attest every released archive + the checksums file. Produces a single
      # Sigstore-signed provenance whose subjects are each file's digest, so
      # `gh attestation verify <archive> --repo threatcl/threatcl` works for any
      # one of them (and for SHA256SUMS itself).
      - name: Attest release binaries + checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sbom.json
            dist/SHA256SUMS

      # Resolve the digest of the multi-arch manifest GoReleaser just pushed. The
      # image tag mirrors the git tag (.goreleaser.yaml tags `v{{ .Version }}`),
      # so $GITHUB_REF_NAME (e.g. v1.2.3) is the right reference. Attesting the
      # index digest covers both :v<version> and :latest (same push, same digest).
      - name: Resolve pushed image digest
        id: image
        run: |
          set -euo pipefail
          ref="ghcr.io/threatcl/threatcl:${GITHUB_REF_NAME}"
          digest="$(docker buildx imagetools inspect "$ref" --format '{{ .Manifest.Digest }}')"
          echo "resolved $ref -> $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # Attest the image BY DIGEST and push the provenance to ghcr.io as an OCI
      # referrer, so `gh attestation verify oci://ghcr.io/threatcl/threatcl:<tag>`
      # can validate it.
      - name: Attest container image (by digest)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/threatcl/threatcl
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
