name: release

# One workflow, three trust contexts (see docs/SLSA.md):
#   - pull_request  -> dry-run the whole flow, no publish (fork-safe, read-only)
#   - push to main  -> publish rolling `dev` pre-release binaries (post-merge)
#   - push tag v*   -> full release: GitHub Release + multi-arch image + latest
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # PR into main: build every platform archive, checksums, AND the container
  # images via GoReleaser snapshot — with NO publish/push. This catches
  # cross-platform build, packaging, and Dockerfile/GoReleaser-config breakage
  # before it can reach a tag. Read-only token; safe for fork PRs.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.9'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: GoReleaser dry-run (snapshot, no publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --snapshot --clean

  # Push to main (post-merge, trusted): build the binaries + checksums and
  # publish them to a rolling `dev` GitHub pre-release. Stable `dev` filenames
  # overwrite cleanly. Images are skipped here (validated on PR, only tags push
  # images) to keep main fast.
  dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.9'
      - name: GoReleaser build (snapshot, no docker)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=docker
      - name: Publish rolling dev pre-release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: dev
          name: "Development Build"
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

  # Tag v*: the real release. GoReleaser builds + publishes the GitHub Release
  # (mac/linux/windows archives + SHA256SUMS) and builds + pushes the multi-arch
  # image as :v<version> and :latest.
  #
  # Phase 3 will add `id-token: write` + `attestations: write` here plus an
  # actions/attest-build-provenance step over dist/ and the image digest.
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.9'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
