version: 2
updates:
  # GitHub Actions used by the workflows under .github/workflows.
  # Dependabot keeps the pinned commit SHAs current and refreshes the
  # trailing "# vX.Y.Z" version comments. This is how the older docker/*
  # action pins get bumped to current majors (as reviewable, CI-gated PRs).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  # Go module dependencies (incl. github.com/threatcl/spec).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Base images in the Dockerfile (golang / alpine). The CLI ships as a
  # container image to ghcr.io, so base-image CVEs are part of our supply
  # chain. Remove this block if you'd rather pin base images by hand.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
